<svg viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Distance to the user oracle versus cumulative cost: the fused turn buys a few big steps and plateaus above the oracle, while many cheap feedback rounds keep stepping down onto it">
  <rect x="0" y="0" width="700" height="360" fill="#fbfbfd" stroke="#d9dce3"/>
  <text x="350" y="26" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1a202c">Figure 3. Distance to the user oracle vs. cumulative cost</text>
  <!-- axes -->
  <line x1="72" y1="56" x2="72" y2="290" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="72" y1="290" x2="650" y2="290" stroke="#4a5568" stroke-width="1.5"/>
  <text x="62" y="66" text-anchor="end" font-family="sans-serif" font-size="12" fill="#4a5568">far</text>
  <text x="62" y="276" text-anchor="end" font-family="sans-serif" font-size="12" fill="#4a5568">at oracle</text>
  <text x="26" y="175" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4a5568" transform="rotate(-90 26 175)">distance to user oracle</text>
  <text x="361" y="318" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4a5568">cumulative cost / wall-clock  →</text>
  <!-- oracle baseline -->
  <line x1="72" y1="278" x2="650" y2="278" stroke="#2f855a" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="646" y="272" text-anchor="end" font-family="sans-serif" font-size="12" fill="#2f855a">user oracle</text>
  <!-- fused: few big steps, plateau above oracle, slight uptick -->
  <polyline fill="none" stroke="#c0432b" stroke-width="2.6" points="72,80 168,80 168,168 340,168 340,196 520,196 520,188 650,188"/>
  <circle cx="168" cy="168" r="3.5" fill="#c0432b"/>
  <circle cx="340" cy="196" r="3.5" fill="#c0432b"/>
  <circle cx="520" cy="188" r="3.5" fill="#c0432b"/>
  <text x="356" y="136" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#c0432b">fused turn (self-verify + repair)</text>
  <text x="356" y="152" font-family="sans-serif" font-size="11" fill="#c0432b">each plateau = one turn at cost ≈ 100</text>
  <text x="356" y="167" font-family="sans-serif" font-size="11" fill="#c0432b">plateaus above the oracle · may tick up</text>
  <!-- separated: many small steps to oracle, one dot per feedback round -->
  <polyline fill="none" stroke="#2b6cb0" stroke-width="2.6" points="72,80 110,104 148,124 186,142 224,160 262,178 300,196 338,212 376,228 414,242 452,253 490,262 528,269 566,273 604,276 650,277"/>
  <circle cx="110" cy="104" r="2.8" fill="#2b6cb0"/>
  <circle cx="148" cy="124" r="2.8" fill="#2b6cb0"/>
  <circle cx="186" cy="142" r="2.8" fill="#2b6cb0"/>
  <circle cx="224" cy="160" r="2.8" fill="#2b6cb0"/>
  <circle cx="262" cy="178" r="2.8" fill="#2b6cb0"/>
  <circle cx="300" cy="196" r="2.8" fill="#2b6cb0"/>
  <circle cx="338" cy="212" r="2.8" fill="#2b6cb0"/>
  <circle cx="376" cy="228" r="2.8" fill="#2b6cb0"/>
  <circle cx="414" cy="242" r="2.8" fill="#2b6cb0"/>
  <circle cx="452" cy="253" r="2.8" fill="#2b6cb0"/>
  <circle cx="490" cy="262" r="2.8" fill="#2b6cb0"/>
  <circle cx="528" cy="269" r="2.8" fill="#2b6cb0"/>
  <circle cx="566" cy="273" r="2.8" fill="#2b6cb0"/>
  <circle cx="604" cy="276" r="2.8" fill="#2b6cb0"/>
  <circle cx="650" cy="277" r="2.8" fill="#2b6cb0"/>
  <text x="140" y="235" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#2b6cb0">separated: cheap parallel turns + feedback</text>
  <text x="140" y="251" font-family="sans-serif" font-size="11" fill="#2b6cb0">each dot = one round of parallel generation, re-aimed by feedback</text>
  <text x="140" y="266" font-family="sans-serif" font-size="11" fill="#2b6cb0">many small steps · converges onto the oracle</text>
</svg>
